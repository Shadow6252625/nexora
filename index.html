<style>
    /* Global Typography */
    body, p, span, div, a, button, input, th, td {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
    }
    h1, h2, h3, h4, h5, h6, .text-3xl, .text-4xl, .text-5xl, .text-7xl {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        letter-spacing: -0.02em !important;
    }

    /* Ultra-Premium Glassmorphism Panels */
    .panel-glass, .sidebar-glass {
        background: radial-gradient(130% 130% at 50% -20%, rgba(255, 255, 255, 0.05) 0%, rgba(10, 10, 14, 0.4) 100%), 
                    rgba(10, 10, 12, 0.3) !important;
        backdrop-filter: blur(48px) saturate(160%) !important;
        -webkit-backdrop-filter: blur(48px) saturate(160%) !important;
        border: 1px solid rgba(255, 255, 255, 0.04) !important;
        border-top: 1px solid rgba(255, 255, 255, 0.12) !important;
        border-left: 1px solid rgba(255, 255, 255, 0.08) !important;
        box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9), 
                    inset 0 1px 0 rgba(255, 255, 255, 0.05) !important;
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease !important;
    }
    
    .panel-glass:hover, .sidebar-glass {
        box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 1.0), 
                    inset 0 1px 0 rgba(255, 255, 255, 0.1) !important;
    }
    
    .panel-glass:hover {
        transform: translateY(-2px) !important;
    }

    /* Header Refinement */
    .header-glass {
        background: linear-gradient(to bottom, rgba(5, 5, 8, 0.6) 0%, rgba(5, 5, 8, 0.0)) !important;
        backdrop-filter: blur(24px) !important;
        -webkit-backdrop-filter: blur(24px) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04) !important;
    }

    /* High-Tech Brand Buttons */
    .bg-brand {
        background: linear-gradient(135deg, #4338ca 0%, #6366f1 50%, #8b5cf6 100%) !important;
        color: white !important;
        border: none !important;
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.3) !important;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
    }
    .bg-brand:hover {
        background: linear-gradient(135deg, #4f46e5 0%, #818cf8 50%, #a855f7 100%) !important;
        box-shadow: 0 0 30px rgba(139, 92, 246, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.5) !important;
        transform: scale(1.02) !important;
    }

    /* High-Tech Text Gradients */
    .text-brand {
        background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        text-shadow: none !important;
        font-weight: 800 !important;
    }

    /* Crisp Inputs */
    .input-dark {
        background: rgba(0, 0, 0, 0.3) !important;
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
        border-radius: 124px !important;
        color: white !important;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.3) !important;
        transition: all 0.3s ease !important;
    }
    .input-dark:focus {
        background: rgba(0, 0, 0, 0.5) !important;
        border-color: #818cf8 !important;
        box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.25), inset 0 2px 4px rgba(0,0,0,0.3) !important;
        outline: none !important;
    }

    /* Universal Button Transitions */
    button {
        transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease, background 0.2s ease !important;
    }
    button:active {
        transform: scale(0.97) !important;
    }
</style>

    const FRAME_BY_PAGE = {
      home: document.getElementById('frame-home'),
      markets: document.getElementById('frame-markets'),
      dashboard: document.getElementById('frame-dashboard'),
      docs: document.getElementById('frame-docs'),
    };

    const loaded = new Set();

    function decodeB64Utf8(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder('utf-8').decode(bytes);
    }

    function show(page) {
      for (const [k, frame] of Object.entries(FRAME_BY_PAGE)) {
        frame.classList.toggle('active', k === page);
      }
    }

    function routeTo(page, replace=false) {
      if (!FRAME_BY_PAGE[page]) page = 'home';
      const hash = '#' + page;
      if (replace) history.replaceState(null, '', hash);
      else history.pushState(null, '', hash);
      ensureLoaded(page);
      show(page);
    }

    function ensureLoaded(page) {
      if (loaded.has(page)) return;
      const frame = FRAME_BY_PAGE[page];
      const html = decodeB64Utf8(PAGES[page]);
      frame.srcdoc = html;
      frame.onload = () => {
        try {
          const doc = frame.contentDocument;

          // Replace logo paths with embedded data URI
          doc.querySelectorAll('img[src="assets/nexus-logo.svg"]').forEach(img => {
            img.src = LOGO_DATA_URI;
          });

          // Intercept internal navigation so pages stay connected in single-file mode
          doc.addEventListener('click', (e) => {
            const a = e.target && e.target.closest ? e.target.closest('a') : null;
            if (!a) return;
            const href = a.getAttribute('href');
            if (!href) return;

            const normalized = href.replace(/^\.\//, '');

            if (normalized === 'index.html') { e.preventDefault(); routeTo('home'); return; }
            if (normalized === 'markets.html') { e.preventDefault(); routeTo('markets'); return; }
            if (normalized === 'dashboard.html') { e.preventDefault(); routeTo('dashboard'); return; }
            if (normalized === 'docs.html') { e.preventDefault(); routeTo('docs'); return; }

            // Allow hash-only in-page jumps
            if (normalized.startsWith('#')) return;
          }, true);

          // Normalize script-driven navigation if used
          const originalAssign = frame.contentWindow.location.assign.bind(frame.contentWindow.location);
          frame.contentWindow.location.assign = (url) => {
            const u = String(url || '');
            if (u.endsWith('markets.html')) return routeTo('markets');
            if (u.endsWith('dashboard.html')) return routeTo('dashboard');
            if (u.endsWith('docs.html')) return routeTo('docs');
            if (u.endsWith('index.html')) return routeTo('home');
            return originalAssign(url);
          };
        } catch (_) {
          // ignore
        }
      };
      loaded.add(page);
    }

    window.addEventListener('popstate', () => {
      const page = (location.hash || '#home').slice(1);
      ensureLoaded(page);
      show(page);
    });

    // Initial route
    const initial = (location.hash || '#home').slice(1);
    ensureLoaded(initial);
    show(initial);
  </script>
